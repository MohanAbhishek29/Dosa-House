<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Dashboard | Dosa House</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/ui.css">
    <link rel="stylesheet" href="styles/mobile.css">
    <script>!function(){var e=document.createElement('div');e.id='__auth_loader';e.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#0f1a0f;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Outfit,sans-serif;transition:opacity 0.2s';e.innerHTML='<div style="font-size:3rem">🛵</div><div style="font-weight:800;color:#4CAF50;margin-top:0.5rem;font-size:1.1rem">Delivery</div><div style="width:40px;height:4px;background:#4CAF50;border-radius:2px;margin-top:1rem;animation:p 1s ease-in-out infinite"></div><style>@keyframes p{0%,100%{opacity:.3;transform:scaleX(.5)}50%{opacity:1;transform:scaleX(1)}}</style>';document.documentElement.appendChild(e)}()</script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg-dark-earth, #0b110b); color: #f0f0f0; font-family: 'Outfit', sans-serif; min-height: 100vh; }

        .top-nav {
            background: var(--glass-bg, rgba(19, 28, 19, 0.7));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border, rgba(46, 125, 50, 0.15));
            position: sticky; top: 0; z-index: 100;
        }
        .top-nav h1 { font-size: 1.2rem; color: var(--color-banana-leaf, #4CAF50); font-weight: 800; }
        .btn-logout { background: transparent; border: 1px solid #555; color: #ccc; padding: 0.4rem 1rem; border-radius: var(--border-radius-pill, 50px); cursor: pointer; transition: var(--bouncy-transition, all 0.3s ease); }
        .btn-logout:hover { border-color: #d32f2f; color: white; background: #d32f2f; transform: translateY(-2px); }

        .delivery-card {
            background: var(--bg-dark-surface, #1a261a);
            border-radius: var(--border-radius-card, 20px);
            border: 1px solid var(--glass-border, rgba(46, 125, 50, 0.15));
            margin: 1rem;
            overflow: hidden;
            transition: var(--bouncy-transition, all 0.3s ease);
            box-shadow: var(--shadow-clay, 0 4px 15px rgba(0,0,0,0.2));
        }
        .delivery-card:hover {
            transform: translateY(-4px);
            border-color: var(--color-banana-leaf, #4CAF50);
            box-shadow: var(--shadow-ambient, 0 12px 24px rgba(0,0,0,0.4));
        }
        .delivery-card-header {
            padding: 1.2rem;
            background: rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .order-id { color: var(--color-banana-leaf, #4CAF50); font-weight: 800; font-size: 1rem; }
        .order-time { color: #888; font-size: 0.8rem; }

        .delivery-body { padding: 1.2rem; }
        .customer-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.4rem; color: white; }
        .address { color: #ccc; font-size: 0.9rem; margin-bottom: 1rem; line-height: 1.4; }

        .items-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 1rem; margin-bottom: 1.2rem; }
        .item-row { display: flex; justify-content: space-between; font-size: 0.9rem; color: #ddd; padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item-row:last-child { border-bottom: none; }

        .total-row { display: flex; justify-content: space-between; font-weight: 800; font-size: 1.2rem; margin-bottom: 1.2rem; align-items: center; }
        .total-amount { color: var(--color-banana-leaf, #4CAF50); }

        .payment-badge { padding: 0.4rem 1rem; border-radius: var(--border-radius-pill, 50px); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .payment-cash { background: rgba(46, 125, 50, 0.2); color: #A5D6A7; border: 1px solid #4CAF50; }
        .payment-upi { background: rgba(123, 31, 162, 0.2); color: #E1BEE7; border: 1px solid #9C27B0; }

        /* OTP Confirm */
        .otp-section { margin-top: 1.2rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .otp-label { font-size: 0.85rem; color: #aaa; margin-bottom: 0.8rem; font-weight: 600; }
        .otp-input-row { display: flex; gap: 0.8rem; }
        .otp-input {
            flex: 1; padding: 0.8rem; background: var(--bg-dark-panel, #131c13); border: 2px solid #333;
            border-radius: 12px; color: var(--color-saffron, #F57F17); font-size: 1.3rem; font-weight: 800;
            text-align: center; letter-spacing: 0.3em; outline: none; transition: var(--bouncy-transition, all 0.3s ease);
        }
        .otp-input:focus { border-color: var(--color-saffron, #F57F17); box-shadow: var(--shadow-glow, 0 0 15px rgba(245, 127, 23, 0.4)); }
        .btn-confirm {
            padding: 0.8rem 1.5rem; background: var(--color-banana-leaf, #2E7D32); color: white;
            border: none; border-radius: 12px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: var(--bouncy-transition, all 0.3s ease); white-space: nowrap;
            box-shadow: 0 4px 10px rgba(46,125,50,0.3);
        }
        .btn-confirm:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(46,125,50,0.5); }
        .btn-confirm:active { transform: translateY(1px); }

        .empty-state { text-align: center; padding: 5rem 2rem; color: #888; background: var(--glass-bg); margin: 1rem; border-radius: var(--border-radius-card); border: 1px dashed #444; }
        .empty-state .emoji { font-size: 4rem; display: block; margin-bottom: 1.5rem; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); }

        #delivery-greeting { font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div>
            <h1>🛵 Delivery Dashboard</h1>
            <span id="delivery-greeting">Loading...</span>
        </div>
        <button class="btn-logout" onclick="logoutUser()">Logout</button>
    </nav>

    <div style="background:#1a2a1a;border-bottom:1px solid #2a3a2a;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;">
        <div>
            <div style="font-size:0.85rem;color:#aaa;">Today's Deliveries</div>
            <div id="del-count" style="font-size:1.8rem;font-weight:800;color:#4CAF50;">0</div>
        </div>
        <div style="text-align:right;">
            <div style="font-size:0.85rem;color:#aaa;">Earnings (₹40/order)</div>
            <div id="del-earnings" style="font-size:1.8rem;font-weight:800;color:#F57F17;">₹0</div>
        </div>
    </div>

    <div style="display:flex; border-bottom:1px solid #2a3a2a;">
        <button id="tab-active" onclick="switchDeliveryTab('active')" style="flex:1; background:none; border:none; color:#4CAF50; padding:1rem; font-size:1rem; font-weight:700; cursor:pointer; border-bottom:3px solid #4CAF50; font-family:inherit;">Active Trips</button>
        <button id="tab-history" onclick="switchDeliveryTab('history')" style="flex:1; background:none; border:none; color:#888; padding:1rem; font-size:1rem; font-weight:700; cursor:pointer; border-bottom:3px solid transparent; font-family:inherit;">History</button>
    </div>

    <div id="delivery-list" style="padding:1rem 0;">
        <div class="empty-state">
            <span class="emoji">⏳</span>
            <p>Waiting for deliveries...</p>
        </div>
    </div>

    <div id="history-panel" style="display:none; padding:1.5rem;">
        <div style="background:#1a2a1a; border-radius:12px; padding:1.5rem; border:1px solid #2a3a2a; margin-bottom:1.5rem; text-align:center;">
            <div style="color:#aaa; font-size:0.9rem; margin-bottom:0.5rem;">Lifetime Earnings</div>
            <div id="lifetime-earnings" style="font-size:2.5rem; font-weight:800; color:#F57F17;">₹0</div>
            <div style="color:#888; font-size:0.8rem; margin-top:0.5rem;">Total Trips: <span id="lifetime-trips" style="color:#fff;">0</span></div>
        </div>
        <h3 style="color:#aaa; margin-bottom:1rem; font-size:1rem;">Past Deliveries</h3>
        <div id="history-list" style="display:flex; flex-direction:column; gap:1rem;">
            <p style="color:#888; text-align:center;">Loading history...</p>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="scripts/firebase-config.js"></script>
    <script src="scripts/auth.js"></script>
    <script>
        let currentUser = null;
        requireAuth(['delivery']).then(user => {
            if (!user) return;
            currentUser = user;
            document.getElementById('delivery-greeting').textContent = `Logged in as ${user.name || user.email}`;
            listenToDeliveries();
            listenToEarnings(user.uid);
        });

        window.switchDeliveryTab = function(tab) {
            if (tab === 'active') {
                document.getElementById('tab-active').style.borderBottomColor = '#4CAF50';
                document.getElementById('tab-active').style.color = '#4CAF50';
                document.getElementById('tab-history').style.borderBottomColor = 'transparent';
                document.getElementById('tab-history').style.color = '#888';
                
                document.getElementById('delivery-list').style.display = 'block';
                document.getElementById('history-panel').style.display = 'none';
            } else {
                document.getElementById('tab-history').style.borderBottomColor = '#4CAF50';
                document.getElementById('tab-history').style.color = '#4CAF50';
                document.getElementById('tab-active').style.borderBottomColor = 'transparent';
                document.getElementById('tab-active').style.color = '#888';
                
                document.getElementById('history-panel').style.display = 'block';
                document.getElementById('delivery-list').style.display = 'none';
            }
        };

        function listenToEarnings(uid) {
            db.collection('orders')
                .where('deliveryBoyId', '==', uid)
                .onSnapshot(snap => {
                    let todayDeliveredCount = 0;
                    let totalDeliveredCount = 0;
                    const todayStr = new Date().toDateString();
                    const historyOrders = [];
                    
                    snap.docs.forEach(doc => {
                        const order = doc.data();
                        order.id = doc.id;
                        if (order.status === 'delivered') {
                            totalDeliveredCount++;
                            historyOrders.push(order);
                            const dateStr = order.deliveredAt?.toDate ? order.deliveredAt.toDate().toDateString() : new Date(order.createdAt).toDateString();
                            if (dateStr === todayStr) {
                                todayDeliveredCount++;
                            }
                        }
                    });

                    // Update Top Stats
                    document.getElementById('del-count').textContent = todayDeliveredCount;
                    document.getElementById('del-earnings').textContent = '₹' + (todayDeliveredCount * 40);

                    // Update History Stats
                    document.getElementById('lifetime-trips').textContent = totalDeliveredCount;
                    document.getElementById('lifetime-earnings').textContent = '₹' + (totalDeliveredCount * 40);

                    // Sort history newest first
                    historyOrders.sort((a, b) => {
                        const ta = a.deliveredAt?.toDate ? a.deliveredAt.toDate() : 0;
                        const tb = b.deliveredAt?.toDate ? b.deliveredAt.toDate() : 0;
                        return tb - ta;
                    });

                    const hList = document.getElementById('history-list');
                    if (historyOrders.length === 0) {
                        hList.innerHTML = '<p style="color:#888; text-align:center;">No past deliveries found.</p>';
                    } else {
                        hList.innerHTML = historyOrders.map(o => `
                            <div style="background:#0a1a0a; border-radius:8px; padding:1rem; border:1px solid #2a3a2a; display:flex; justify-content:space-between; align-items:center;">
                                <div>
                                    <div style="font-weight:bold; color:#fff; font-size:1rem;">${o.orderId || o.id.substring(0,8)}</div>
                                    <div style="color:#888; font-size:0.8rem;">${o.deliveredAt?.toDate ? o.deliveredAt.toDate().toLocaleDateString() : 'Unknown date'}</div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="color:#4CAF50; font-weight:800; font-size:1.1rem;">+₹40</div>
                                </div>
                            </div>
                        `).join('');
                    }
                });
        }

        function listenToDeliveries() {
            db.collection('orders')
                .where('status', 'in', ['sent_to_delivery', 'out_for_delivery'])
                .onSnapshot(snapshot => {
                    let orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // Filter by assigned Delivery Boy
                    orders = orders.filter(o => o.assignedDeliveryId === currentUser.uid);

                    // Sort locally
                    orders.sort((a, b) => {
                        const ta = a.createdAt?.toDate ? a.createdAt.toDate() : new Date();
                        const tb = b.createdAt?.toDate ? b.createdAt.toDate() : new Date();
                        return ta - tb;
                    });
                    renderDeliveries(orders);
                });
        }

        function renderDeliveries(orders) {
            const list = document.getElementById('delivery-list');
            if (orders.length === 0) {
                list.innerHTML = `<div class="empty-state"><span class="emoji">😴</span><p>No deliveries right now. Rest up!</p></div>`;
                return;
            }
            list.innerHTML = orders.map(order => createDeliveryCard(order)).join('');
        }

        function createDeliveryCard(order) {
            const time = order.createdAt?.toDate ? order.createdAt.toDate().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' }) : '--';
            const items = (order.items || []).map(i => `<div class="item-row"><span>${i.quantity}x ${i.title}</span><span>₹${i.price * i.quantity}</span></div>`).join('');
            const payClass = order.paymentMethod === 'upi' ? 'payment-upi' : 'payment-cash';
            const payLabel = order.paymentMethod === 'upi' ? '💸 UPI Paid' : '💵 Collect Cash';

            let mapButton = '';
            if (order.deliveryLocation && order.deliveryLocation.lat) {
                const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${order.deliveryLocation.lat},${order.deliveryLocation.lng}`;
                mapButton = `<a href="${mapsUrl}" target="_blank" style="display:inline-block;margin-top:0.5rem;padding:0.4rem 0.8rem;background:#1976D2;color:white;text-decoration:none;border-radius:8px;font-size:0.85rem;font-weight:700;">🗺️ Navigate</a>`;
            }

            let actionArea = '';
            if (order.status === 'sent_to_delivery') {
                actionArea = `
                    <div style="margin-top:1.5rem;text-align:center;">
                        <button onclick="startDelivery('${order.id}')" style="padding:1rem 2rem;background:#F57F17;color:white;border:none;border-radius:12px;font-size:1.1rem;font-weight:800;width:100%;cursor:pointer;">🛵 Accept & Start Delivery</button>
                    </div>
                `;
            } else if (order.status === 'out_for_delivery') {
                actionArea = `
                    <div class="otp-section">
                        <div class="otp-label">🔐 Ask customer for OTP to confirm delivery:</div>
                        <div class="otp-input-row">
                            <input class="otp-input" type="number" placeholder="OTP" maxlength="4" id="otp-${order.id}">
                            <button class="btn-confirm" onclick="confirmDelivery('${order.id}', '${order.deliveryOTP}')">Confirm ✅</button>
                        </div>
                    </div>
                `;
            }

            return `
            <div class="delivery-card">
                <div class="delivery-card-header">
                    <div class="order-id">${order.orderId || order.id}</div>
                    <div class="order-time">${time}</div>
                </div>
                <div class="delivery-body">
                    <div class="customer-name">👤 ${order.customerName || 'Customer'}</div>
                    <div class="address">
                        📍 ${order.deliveryAddress || 'No address provided'}
                        <br>${mapButton}
                    </div>
                    <div style="margin-bottom:0.5rem">📞 ${order.customerPhone || 'No phone'}</div>

                    <div class="items-summary">${items}</div>

                    <div class="total-row">
                        <span>Total <span class="payment-badge ${payClass}">${payLabel}</span></span>
                        <span class="total-amount">₹${order.total}</span>
                    </div>

                    ${actionArea}
                </div>
            </div>`;
        }

        async function startDelivery(orderId) {
            try {
                if (!currentUser) return;
                // OTP was already generated by Admin when sending to delivery.
                // We just update the status — do NOT overwrite the OTP!
                await db.collection('orders').doc(orderId).update({
                    status: 'out_for_delivery',
                    deliveryBoyId: currentUser.uid,
                    deliveryBoyName: currentUser.name || currentUser.email.split('@')[0],
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('🚀 Delivery started! Customer has received the OTP.', 'success');
            } catch (e) {
                showToast('Error accepting delivery', 'error');
            }
        }

        async function confirmDelivery(orderId, correctOTP) {
            const inputOTP = document.getElementById(`otp-${orderId}`).value.trim();
            if (inputOTP !== correctOTP) {
                showToast('❌ Wrong OTP! Ask customer again.', 'error');
                return;
            }
            try {
                await db.collection('orders').doc(orderId).update({
                    status: 'delivered',
                    deliveredAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast('✅ Delivery confirmed! Great job!', 'success');
            } catch (e) {
                showToast('Error. Try again.', 'error');
                console.error(e);
            }
        }
    </script>
    <script src="scripts/ui.js"></script>
</body>
</html>
