<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display System | Dosa House</title>
    <link rel="stylesheet" href="styles/main.css"> <!-- Base styles -->
    <link rel="stylesheet" href="styles/kitchen.css"> <!-- KDS specific -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>!function(){var e=document.createElement('div');e.id='__auth_loader';e.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#0d1f0d;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Outfit,sans-serif;transition:opacity 0.2s';e.innerHTML='<img src="assets/images/logo_dosa_house.png" alt="Logo" style="width:64px;height:64px;border-radius:12px;box-shadow:0 4px 15px rgba(245,127,23,0.3);margin-bottom:0.5rem"><div style="font-weight:800;color:#4CAF50;margin-top:0.5rem;font-size:1.1rem">Kitchen View</div><div style="width:40px;height:4px;background:#4CAF50;border-radius:2px;margin-top:1rem;animation:p 1s ease-in-out infinite"></div><style>@keyframes p{0%,100%{opacity:.3;transform:scaleX(.5)}50%{opacity:1;transform:scaleX(1)}}</style>';document.documentElement.appendChild(e)}()</script>
</head>

<body>

    <header class="kitchen-header">
        <div class="kitchen-brand">
            <h1>👨‍🍳 KITCHEN VIEW</h1>
            <span class="live-indicator">● LIVE</span>
        </div>
        <div class="kitchen-stats">
            <div class="stat-box">
                <span class="stat-label">PENDING</span>
                <span class="stat-value" id="count-pending">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">PREPARING</span>
                <span class="stat-value" id="count-preparing">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">COMPLETED</span>
                <span class="stat-value" id="count-completed">0</span>
            </div>
        </div>
        <div>
            <button onclick="openKitchenSummary()" class="exit-btn" style="margin-right:0.5rem; background:#4CAF50; color:white; border-color:#4CAF50; cursor:pointer;">📊 View Summary</button>
            <a href="index.html" class="exit-btn">Exit KDS</a>
        </div>
    </header>

    <main class="kitchen-board">
        <!-- Order Tickets will be injected here by JS -->
        <div id="orders-grid" class="orders-grid">
            <!-- Example Ticket Structure for Reference -->
            <!-- 
            <div class="ticket ticket-pending">
                <div class="ticket-header">
                    <span class="ticket-id">#ORD-1234</span>
                    <span class="ticket-time">12:30 PM</span>
                </div>
                <div class="ticket-type">Dine-in</div>
                <ul class="ticket-items">
                    <li>2x Masala Dosa</li>
                    <li>1x Idli Sambar</li>
                </ul>
                <div class="ticket-actions">
                    <button class="btn-action btn-accept">Accept</button>
                    <button class="btn-action btn-ready">Ready</button>
                </div>
            </div> 
            -->
            <div class="empty-kitchen">
                <h2>No Active Orders</h2>
                <p>Waiting for new tickets...</p>
            </div>
        </div>
    </main>

    <!-- Audio for new order alert -->
    <audio id="alert-sound" src="assets/audio/bell.mp3"></audio>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="scripts/firebase-config.js"></script>
    <script src="scripts/auth.js"></script>
    <script src="scripts/kitchen.js"></script>

    <!-- Kitchen Summary Modal -->
    <div id="summary-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(11, 17, 11, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index:9999; align-items:center; justify-content:center; font-family: Outfit, sans-serif; transition: var(--bouncy-transition, all 0.3s ease);">
        <div style="background:var(--bg-dark-surface, #1a261a); padding:0; border-radius:var(--border-radius-card, 20px); width:90%; max-width:500px; max-height:80vh; overflow:hidden; border:1px solid var(--glass-border, rgba(46, 125, 50, 0.15)); color: white; display:flex; flex-direction:column; box-shadow: var(--shadow-ambient, 0 12px 30px rgba(0,0,0,0.5));">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(255,255,255,0.05); padding:1.5rem 1.5rem 0.5rem 1.5rem; background: rgba(0,0,0,0.2);">
                <h2 style="margin:0; color:var(--color-banana-leaf, #4CAF50);">Today's Performance</h2>
                <button onclick="document.getElementById('summary-modal').style.display='none'" style="background:none; border:none; color:#aaa; font-size:1.8rem; cursor:pointer; transition: var(--bouncy-transition, all 0.3s ease);" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#aaa'">&times;</button>
            </div>
            
            <div style="display:flex; border-bottom:1px solid rgba(255,255,255,0.05); background:rgba(0,0,0,0.3);">
                <button id="k-tab-summary" onclick="switchKitchenTab('summary')" style="flex:1; padding:1rem; background:none; border:none; border-bottom:3px solid var(--color-banana-leaf, #4CAF50); color:var(--color-banana-leaf, #4CAF50); font-weight:bold; cursor:pointer; font-size: 1rem; transition: var(--bouncy-transition, all 0.3s ease);">Item Summary</button>
                <button id="k-tab-tickets" onclick="switchKitchenTab('tickets')" style="flex:1; padding:1rem; background:none; border:none; border-bottom:3px solid transparent; color:#888; font-weight:bold; cursor:pointer; font-size: 1rem; transition: var(--bouncy-transition, all 0.3s ease);">Past Tickets</button>
            </div>

            <div id="summary-content" style="padding:1.5rem; overflow-y:auto; flex:1;">
                <p style="color:#aaa;">Loading stats...</p>
            </div>
            <div id="tickets-content" style="display:none; padding:1.5rem; overflow-y:auto; flex:1; background:rgba(0,0,0,0.1);">
                <p style="color:#aaa;">Loading tickets...</p>
            </div>
        </div>
    </div>
</body>
</html>
