<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Dosa House</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/ui.css">
    <link rel="manifest" href="manifest.json">
    <script>!function(){var e=document.createElement('div');e.id='__auth_loader';e.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#FFF8E1;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Outfit,sans-serif;transition:opacity 0.2s';e.innerHTML='<div style="font-size:3rem">🍛</div><div style="font-weight:800;color:#3E2723;margin-top:0.5rem;font-size:1.1rem">Dosa House</div><div style="width:40px;height:4px;background:#F57F17;border-radius:2px;margin-top:1rem;animation:p 1s ease-in-out infinite"></div><style>@keyframes p{0%,100%{opacity:.3;transform:scaleX(.5)}50%{opacity:1;transform:scaleX(1)}}</style>';document.documentElement.appendChild(e)}()</script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #FFF8E1;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding-bottom: 5rem;
        }

        /* Top Nav */
        .top-bar {
            background: white;
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            position: sticky; top: 0; z-index: 100;
        }
        .back-btn {
            background: none; border: none; font-size: 1.4rem; cursor: pointer;
            color: #3E2723; padding: 0.2rem 0.5rem;
        }
        .top-bar h1 { font-size: 1.2rem; font-weight: 800; color: #3E2723; }

        /* Order Cards */
        .orders-list { padding: 1rem; }

        .order-card {
            background: white;
            border-radius: 18px;
            margin-bottom: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.07);
        }

        .order-header {
            padding: 1rem 1.2rem;
            background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-id { font-weight: 800; color: #3E2723; font-size: 0.95rem; }
        .order-date { color: #888; font-size: 0.78rem; }

        .status-pill {
            padding: 0.3rem 0.9rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .status-pending    { background: #FFF9C4; color: #F57F17; }
        .status-accepted   { background: #E3F2FD; color: #1565C0; }
        .status-preparing  { background: #FFF3E0; color: #E65100; }
        .status-ready      { background: #F3E5F5; color: #6A1B9A; }
        .status-out_for_delivery { background: #E8F5E9; color: #1B5E20; }
        .status-delivered  { background: #E8F5E9; color: #2E7D32; }

        .order-body { padding: 1.2rem; }

        .order-items { margin-bottom: 1rem; }
        .item-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.88rem;
            color: #555;
            padding: 0.25rem 0;
            border-bottom: 1px dashed #f0e0c0;
        }
        .item-row:last-child { border-bottom: none; }

        .order-total {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 1.05rem;
            color: #3E2723;
            padding-top: 0.5rem;
        }
        .total-amount { color: #F57F17; }

        /* Progress Steps */
        .progress-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.2rem 0;
            position: relative;
        }
        .progress-bar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 1.8rem;
            right: 1.8rem;
            height: 2px;
            background: #f0e0c0;
            z-index: 0;
            transform: translateY(-60%);
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            z-index: 1;
        }
        .step-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f0e0c0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #aaa;
            border: 2px solid #f0e0c0;
        }
        .step.done .step-dot {
            background: #F57F17;
            color: white;
            border-color: #F57F17;
        }
        .step.active .step-dot {
            background: white;
            color: #F57F17;
            border-color: #F57F17;
            box-shadow: 0 0 0 4px rgba(245,127,23,0.15);
        }
        .step-label {
            font-size: 0.6rem;
            color: #bbb;
            font-weight: 600;
            text-transform: uppercase;
            text-align: center;
            max-width: 50px;
            line-height: 1.2;
        }
        .step.done .step-label, .step.active .step-label { color: #F57F17; }

        /* OTP Box */
        .otp-box {
            margin: 1rem 1.2rem;
            background: linear-gradient(135deg, #1B5E20, #2E7D32);
            border-radius: 14px;
            padding: 1.2rem;
            text-align: center;
            color: white;
        }
        .otp-box h3 { font-size: 0.9rem; margin-bottom: 0.5rem; opacity: 0.9; }
        .otp-number {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 0.4em;
            font-family: 'Courier New', monospace;
        }
        .otp-box p { font-size: 0.78rem; opacity: 0.8; margin-top: 0.3rem; }

        /* UPI QR Box */
        .upi-box {
            margin: 1rem 1.2rem;
            background: linear-gradient(135deg, #4A148C, #7B1FA2);
            border-radius: 14px;
            padding: 1.2rem;
            text-align: center;
            color: white;
        }
        .upi-box h3 { font-size: 0.9rem; margin-bottom: 0.8rem; }
        .upi-box img { border-radius: 10px; background: white; padding: 8px; }
        .upi-box p { font-size: 0.78rem; opacity: 0.8; margin-top: 0.5rem; }

        /* Rating */
        .rating-section {
            padding: 0.8rem 1.2rem 1.2rem;
            text-align: center;
        }
        .stars { font-size: 1.8rem; cursor: pointer; letter-spacing: 0.1em; }
        .rate-label { font-size: 0.85rem; color: #888; margin-bottom: 0.5rem; }

        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            color: #bbb;
        }
        .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 1rem; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            display: flex;
            border-top: 1px solid #f0e0c0;
            z-index: 200;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.6rem 0.3rem;
            text-decoration: none;
            color: #bbb;
            font-size: 0.65rem;
            font-weight: 600;
            gap: 0.2rem;
            transition: color 0.2s;
        }
        .nav-item .icon { font-size: 1.4rem; }
        .nav-item.active { color: #F57F17; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="back-btn" onclick="history.back()">←</button>
        <h1>🧾 My Orders</h1>
    </div>

    <div class="orders-list" id="orders-list">
        <div class="empty-state">
            <span class="emoji">⏳</span>
            <p>Loading your orders...</p>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="icon">🏠</span>Home
        </a>
        <a href="menu.html" class="nav-item">
            <span class="icon">🍛</span>Menu
        </a>
        <a href="orders.html" class="nav-item active">
            <span class="icon">📋</span>Orders
        </a>
        <a href="#" class="nav-item" onclick="logoutUser(); return false;">
            <span class="icon">👤</span>Logout
        </a>
    </nav>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="scripts/firebase-config.js"></script>
    <script src="scripts/auth.js"></script>
    <script>
        const STATUS_STEPS = ['pending','accepted','preparing','ready','out_for_delivery','delivered'];
        const STATUS_LABELS = {
            pending: 'Placed',
            accepted: 'Accepted',
            preparing: 'Cooking',
            ready: 'Ready',
            out_for_delivery: 'On Way',
            delivered: 'Delivered'
        };
        const STATUS_ICONS = {
            pending: '📋',
            accepted: '✅',
            preparing: '👨‍🍳',
            ready: '🔔',
            out_for_delivery: '🛵',
            delivered: '✅'
        };

        requireAuth(['customer']).then(user => {
            if (!user) return;
            listenToMyOrders(user.uid);
        });

        function listenToMyOrders(uid) {
            // No orderBy — avoids composite index requirement. Sort client-side.
            db.collection('orders')
                .where('customerId', '==', uid)
                .onSnapshot(snap => {
                    const orders = snap.docs
                        .map(doc => ({ id: doc.id, ...doc.data() }))
                        .sort((a, b) => {
                            const ta = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(0);
                            const tb = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(0);
                            return tb - ta; // newest first
                        });
                    renderOrders(orders);
                }, err => {
                    console.error('Orders query error:', err);
                    document.getElementById('orders-list').innerHTML =
                        '<div style="text-align:center;padding:3rem;color:#888">⚠️ Could not load orders. Please refresh.</div>';
                });
        }

        function renderOrders(orders) {
            const list = document.getElementById('orders-list');
            if (orders.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">🍛</span>
                        <p>No orders yet!</p>
                        <a href="menu.html" style="display:inline-block;margin-top:1rem;background:#F57F17;color:white;padding:0.8rem 2rem;border-radius:12px;font-weight:700;text-decoration:none;">Browse Menu</a>
                    </div>`;
                return;
            }
            list.innerHTML = orders.map(order => buildOrderCard(order)).join('');
        }

        function buildOrderCard(order) {
            const date = order.createdAt?.toDate
                ? order.createdAt.toDate().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
                : 'Just now';

            const items = (order.items || []).map(i =>
                `<div class="item-row"><span>${i.quantity}x ${i.title}</span><span>₹${i.price * i.quantity}</span></div>`
            ).join('');

            const currentStepIdx = STATUS_STEPS.indexOf(order.status);
            const steps = STATUS_STEPS.slice(0, 6).map((s, i) => {
                const cls = i < currentStepIdx ? 'done' : i === currentStepIdx ? 'active' : '';
                return `<div class="step ${cls}">
                    <div class="step-dot">${STATUS_ICONS[s]}</div>
                    <div class="step-label">${STATUS_LABELS[s]}</div>
                </div>`;
            }).join('');

            // OTP section for out_for_delivery
            let otpSection = '';
            if (order.status === 'out_for_delivery' && order.deliveryOTP) {
                otpSection = `
                    <div class="otp-box">
                        <h3>🔐 Your Delivery OTP</h3>
                        <div class="otp-number">${order.deliveryOTP}</div>
                        <p>Give this code to the delivery partner</p>
                    </div>`;
            }

            // UPI QR for pending UPI orders
            let upiSection = '';
            if (order.paymentMethod === 'upi' && order.paymentStatus !== 'paid') {
                const upiLink = `upi://pay?pa=dosahouse@upi&pn=Dosa+House&am=${order.total}&cu=INR&tn=${order.orderId}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(upiLink)}`;
                upiSection = `
                    <div class="upi-box">
                        <h3>💸 Scan to Pay ₹${order.total}</h3>
                        <img src="${qrUrl}" width="180" height="180" alt="UPI QR Code">
                        <p>UPI ID: dosahouse@upi</p>
                        <button onclick="confirmPayment('${order.id}')"
                            style="margin-top:0.8rem;background:white;color:#7B1FA2;border:none;padding:0.6rem 1.5rem;border-radius:10px;font-weight:700;cursor:pointer;">
                            ✅ I've Paid
                        </button>
                    </div>`;
            }

            // Rating section for delivered orders
            let ratingSection = '';
            if (order.status === 'delivered' && !order.rating) {
                ratingSection = `
                    <div class="rating-section">
                        <p class="rate-label">Rate your experience:</p>
                        <div class="stars" id="stars-${order.id}">
                            ${[1,2,3,4,5].map(n =>
                                `<span onclick="rateOrder('${order.id}', ${n})">⭐</span>`
                            ).join('')}
                        </div>
                    </div>`;
            } else if (order.rating) {
                ratingSection = `<div style="text-align:center;padding:0.8rem;color:#F57F17;font-size:0.9rem;">
                    ${'⭐'.repeat(order.rating)} Rated!
                </div>`;
            }

            return `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">${order.orderId || order.id}</div>
                            <div class="order-date">${date}</div>
                        </div>
                        <span class="status-pill status-${order.status}">${STATUS_LABELS[order.status] || order.status}</span>
                    </div>

                    <div class="progress-bar">${steps}</div>

                    ${otpSection}
                    ${upiSection}

                    <div class="order-body">
                        <div class="order-items">${items}</div>
                        <div class="order-total">
                            <span>Total</span>
                            <span class="total-amount">₹${order.total}</span>
                        </div>
                    </div>

                    ${ratingSection}
                </div>`;
        }

        async function confirmPayment(orderId) {
            try {
                await db.collection('orders').doc(orderId).update({
                    paymentStatus: 'paid',
                    paidAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert('✅ Payment confirmed! Admin has been notified.');
            } catch(e) {
                alert('Error. Try again.');
            }
        }

        async function rateOrder(orderId, stars) {
            try {
                await db.collection('orders').doc(orderId).update({
                    rating: stars,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch(e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
