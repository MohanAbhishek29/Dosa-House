<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dosa House</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/ui.css">
    <link rel="manifest" href="manifest.json">
    <script>
        /* Login page — remove auth loader immediately if it exists */
        document.addEventListener('DOMContentLoaded', () => {
            const l = document.getElementById('__auth_loader');
            if (l) l.remove();
        });
    </script>
    <style>
        body {
            opacity: 1 !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFF8E1 0%, #FFE0B2 100%);
            font-family: var(--font-body, 'Outfit', sans-serif);
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-logo { font-size: 3rem; margin-bottom: 0.5rem; }
        .login-title { font-size: 2rem; font-weight: 800; color: #3E2723; margin-bottom: 0.3rem; }
        .login-subtitle { color: #795548; font-size: 1rem; margin-bottom: 2.5rem; }
        .divider {
            display: flex; align-items: center; gap: 1rem;
            margin: 1.5rem 0; color: #aaa; font-size: 0.9rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }
        .staff-section { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #eee; }
        .staff-title { font-size: 0.85rem; color: #999; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 0.4rem; }
        .form-group input {
            width: 100%; padding: 0.8rem 1rem; border: 2px solid #eee;
            border-radius: 10px; font-size: 1rem; outline: none;
            transition: border-color 0.2s; box-sizing: border-box;
        }
        .form-group input:focus { border-color: #F57F17; }
        .btn-staff-login {
            width: 100%; padding: 1rem; background: #F57F17; color: white;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s; font-family: inherit;
        }
        .btn-staff-login:hover { background: #E65100; }
        .btn-staff-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { color: #d32f2f; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo">🍛</div>
        <h1 class="login-title">Dosa House</h1>
        <p class="login-subtitle">Sign in to order authentic South Indian food</p>

        <!-- Customer Google Login via Google Identity Services -->
        <div id="google-btn-container" style="display:flex;justify-content:center;margin-bottom:0.5rem;"></div>
        <p id="google-status" style="text-align:center;color:#888;font-size:0.85rem;min-height:1.2rem;"></p>

        <div class="divider">Staff Login</div>

        <!-- Staff Email/Password Login -->
        <div class="staff-section">
            <p class="staff-title">🔐 Admin / Kitchen / Delivery</p>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="staff-email" placeholder="admin@dosahouse.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="staff-password" placeholder="••••••••">
            </div>
            <p class="error-msg" id="error-msg">Invalid email or password. Try again.</p>
            <button class="btn-staff-login" id="staff-login-btn">Staff Sign In 🔑</button>
        </div>
    </div>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="scripts/firebase-config.js"></script>
    <script src="scripts/auth.js"></script>
    <script>
        // ── Google Identity Services button ──
        window.onGoogleLibraryLoad = function() {
            google.accounts.id.initialize({
                client_id: '54232177389-p41cngsqiv7u0pgucg7gur2niqu0amh7.apps.googleusercontent.com',
                callback: handleGoogleSignIn
            });
            google.accounts.id.renderButton(
                document.getElementById('google-btn-container'),
                { theme: 'outline', size: 'large', width: 340, text: 'continue_with' }
            );
        };

        async function handleGoogleSignIn(response) {
            document.getElementById('google-status').textContent = '⏳ Signing in...';
            try {
                const credential = firebase.auth.GoogleAuthProvider.credential(response.credential);
                await auth.signInWithCredential(credential);
                const user = await getCurrentUser();
                const redirectMap = { admin: 'admin.html', kitchen: 'kitchen.html', delivery: 'delivery.html', customer: 'index.html' };
                window.location.replace(redirectMap[user.role] || 'index.html');
            } catch (e) {
                console.error('Google sign-in error:', e);
                document.getElementById('google-status').textContent = '❌ ' + e.message;
            }
        }

        // ── Already logged in? Show banner ──
        getCurrentUser().then(user => {
            if (!user) return;
            const redirectMap = { admin: 'admin.html', kitchen: 'kitchen.html', delivery: 'delivery.html', customer: 'index.html' };
            const roleLabel = { admin: '👑 Admin', kitchen: '👨‍🍳 Kitchen Staff', delivery: '🛵 Delivery', customer: '👤 Customer' };
            const card = document.querySelector('.login-card');
            const banner = document.createElement('div');
            banner.style.cssText = 'background:#FFF3E0;border:1px solid #FFB74D;border-radius:12px;padding:1rem;margin-bottom:1.5rem;font-size:0.9rem;';
            banner.innerHTML = `
                <strong style="color:#E65100;">Already logged in as:</strong><br>
                <span style="font-size:1rem;font-weight:700;">${roleLabel[user.role] || user.role} — ${user.email}</span><br>
                <div style="display:flex;gap:0.5rem;margin-top:0.8rem;">
                    <button onclick="window.location.replace('${redirectMap[user.role] || 'index.html'}')"
                        style="flex:1;padding:0.6rem;background:#F57F17;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;">
                        Continue →
                    </button>
                    <button onclick="firebase.auth().signOut().then(()=>location.reload())"
                        style="flex:1;padding:0.6rem;background:white;color:#d32f2f;border:1px solid #d32f2f;border-radius:8px;font-weight:700;cursor:pointer;">
                        Switch Account
                    </button>
                </div>
            `;
            card.insertBefore(banner, card.firstChild);
        });

        // ── Staff Login ──
        document.getElementById('staff-login-btn').addEventListener('click', async () => {
            const email = document.getElementById('staff-email').value.trim();
            const password = document.getElementById('staff-password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('staff-login-btn');
            errorMsg.style.display = 'none';
            btn.textContent = '⏳ Signing in...';
            btn.disabled = true;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                const user = await getCurrentUser();
                const redirectMap = { admin: 'admin.html', kitchen: 'kitchen.html', delivery: 'delivery.html', customer: 'index.html' };
                window.location.replace(redirectMap[user.role] || 'index.html');
            } catch (e) {
                errorMsg.textContent = (e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential')
                    ? 'Invalid email or password.' : 'Error: ' + e.message;
                errorMsg.style.display = 'block';
                btn.textContent = 'Staff Sign In 🔑';
                btn.disabled = false;
            }
        });

        // Enter key on password field
        document.getElementById('staff-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('staff-login-btn').click();
        });
    </script>
</body>
</html>
