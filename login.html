<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dosa House</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/ui.css">
    <link rel="manifest" href="manifest.json">
    <style>
        /* Force page visible — login page doesn't need transition */
        body {
            opacity: 1 !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFF8E1 0%, #FFE0B2 100%);
            font-family: var(--font-body, 'Outfit', sans-serif);
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }

        .login-logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 800;
            color: #3E2723;
            margin-bottom: 0.3rem;
        }

        .login-subtitle {
            color: #795548;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: #aaa;
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }

        .btn-google {
            width: 100%;
            padding: 1rem;
            border: 2px solid #eee;
            border-radius: 12px;
            background: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: all 0.2s;
            color: #333;
        }
        .btn-google:hover {
            border-color: #F57F17;
            box-shadow: 0 4px 12px rgba(245, 127, 23, 0.15);
        }

        .staff-section {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
        }

        .staff-title {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus { border-color: #F57F17; }

        .btn-staff-login {
            width: 100%;
            padding: 1rem;
            background: #F57F17;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-staff-login:hover { background: #E65100; }

        .error-msg {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        .loading { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo">🍛</div>
        <h1 class="login-title">Dosa House</h1>
        <p class="login-subtitle">Sign in to order authentic South Indian food</p>

        <!-- Customer Google Login -->
        <button class="btn-google" id="google-login-btn">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continue with Google
        </button>

        <div class="divider">Staff Login</div>

        <!-- Staff Email/Password Login -->
        <div class="staff-section">
            <p class="staff-title">🔐 Admin / Kitchen / Delivery</p>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="staff-email" placeholder="admin@dosahouse.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="staff-password" placeholder="••••••••">
            </div>
            <p class="error-msg" id="error-msg">Invalid email or password. Try again.</p>
            <button class="btn-staff-login" id="staff-login-btn">Staff Sign In 🔑</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="scripts/firebase-config.js"></script>
    <script src="scripts/auth.js"></script>
    <script>
        // If already logged in, redirect based on role
        getCurrentUser().then(user => {
            if (user) {
                const redirectMap = { admin: 'admin.html', kitchen: 'kitchen.html', delivery: 'delivery.html', customer: 'index.html' };
                window.location.href = redirectMap[user.role] || 'index.html';
            }
        });

        // Google Login
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                const user = await getCurrentUser();
                const redirectMap = { admin: 'admin.html', kitchen: 'kitchen.html', delivery: 'delivery.html', customer: 'index.html' };
                window.location.href = redirectMap[user.role] || 'index.html';
            } catch (e) {
                console.error(e);
            }
        });

        // Staff Login
        document.getElementById('staff-login-btn').addEventListener('click', async () => {
            const email = document.getElementById('staff-email').value;
            const password = document.getElementById('staff-password').value;
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            try {
                await auth.signInWithEmailAndPassword(email, password);
                const user = await getCurrentUser();
                const redirectMap = { admin: 'admin.html', kitchen: 'kitchen.html', delivery: 'delivery.html', customer: 'index.html' };
                window.location.href = redirectMap[user.role] || 'index.html';
            } catch (e) {
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
